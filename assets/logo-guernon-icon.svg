<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Guernon Services Techniques">
  <title>GST</title>

  <!-- Fond navy optionnel — retirer le <rect> ci-dessous pour fond transparent -->
  <rect x="0" y="0" width="100" height="100" rx="10" fill="#0f1f38"/>

  <!-- Carré -->
  <rect x="10" y="10" width="80" height="80" rx="3" fill="none" stroke="#c8a84b" stroke-width="2"/>

  <!-- Grille -->
  <line x1="50" y1="18" x2="50" y2="82" stroke="#c8a84b" stroke-width="1" opacity="0.4"/>
  <line x1="18" y1="50" x2="82" y2="50" stroke="#c8a84b" stroke-width="1" opacity="0.4"/>

  <!-- Losange -->
  <polygon points="50,20 74,50 50,80 26,50" fill="none" stroke="#c8a84b" stroke-width="1.6"/>

  <!-- Point central -->
  <circle cx="50" cy="50" r="6" fill="#c8a84b"/>

  <!-- Marques de coin -->
  <path d="M10,22 L10,10 L22,10"   fill="none" stroke="#c8a84b" stroke-width="2.5" stroke-linecap="square"/>
  <path d="M78,10 L90,10 L90,22"   fill="none" stroke="#c8a84b" stroke-width="2.5" stroke-linecap="square"/>
  <path d="M10,78 L10,90 L22,90"   fill="none" stroke="#c8a84b" stroke-width="2.5" stroke-linecap="square"/>
  <path d="M78,90 L90,90 L90,78"   fill="none" stroke="#c8a84b" stroke-width="2.5" stroke-linecap="square"/>
</svg>
