<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 200" width="160" height="200" role="img" aria-label="Guernon Services Techniques">
  <title>Guernon Services Techniques</title>
  <defs>
    <style>
      .logo-serif { font-family: 'Playfair Display', Georgia, serif; }
      .logo-sans  { font-family: 'Source Sans 3', 'Source Sans Pro', system-ui, sans-serif; }
    </style>
  </defs>

  <!-- ── Icône géométrique ── -->
  <!-- Carré principal -->
  <rect x="35" y="8" width="90" height="90" rx="3" fill="none" stroke="#c8a84b" stroke-width="1.5"/>

  <!-- Grille légère -->
  <line x1="80" y1="16" x2="80" y2="90" stroke="#c8a84b" stroke-width="0.7" opacity="0.35"/>
  <line x1="43"  y1="53" x2="117" y2="53" stroke="#c8a84b" stroke-width="0.7" opacity="0.35"/>

  <!-- Losange central -->
  <polygon points="80,22 102,53 80,84 58,53" fill="none" stroke="#c8a84b" stroke-width="1.3"/>

  <!-- Point central -->
  <circle cx="80" cy="53" r="4.5" fill="#c8a84b"/>

  <!-- Marques de coin (navy sur fond blanc) -->
  <path d="M35,19 L35,8 L46,8"    fill="none" stroke="#0f1f38" stroke-width="2"   stroke-linecap="square"/>
  <path d="M114,8 L125,8 L125,19"  fill="none" stroke="#0f1f38" stroke-width="2"   stroke-linecap="square"/>
  <path d="M35,87 L35,98 L46,98"   fill="none" stroke="#0f1f38" stroke-width="2"   stroke-linecap="square"/>
  <path d="M114,98 L125,98 L125,87" fill="none" stroke="#0f1f38" stroke-width="2"  stroke-linecap="square"/>

  <!-- ── Typographie ── -->
  <text class="logo-serif" x="80" y="126" text-anchor="middle"
        fill="#0f1f38" font-size="18" font-weight="600" letter-spacing="0.3">Guernon</text>

  <!-- Ligne séparatrice -->
  <line x1="38" y1="133" x2="122" y2="133" stroke="#c8a84b" stroke-width="0.5" opacity="0.6"/>

  <text class="logo-sans" x="80" y="146" text-anchor="middle"
        fill="#c8a84b" font-size="8" font-weight="300" letter-spacing="2.8">SERVICES TECHNIQUES</text>


</svg>
